<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <!-- library react untuk install modul core react -->
  
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- library react-dom untuk run react di browser -->
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- library babel untuk membaca dan memahami JSX code ke Javascript-->

</head>
<body>
  <div id="mydiv"></div>
  <h2>Another Heading</h2>

  
  <!-- Penting -->
  <!-- type di-set text/babel agar babel bisa memahami JSX elements dan mengkonversinya menjadi javascript yang valid -->
  <script type="text/babel">
    // component 
    function Hello(){
      return <h1>Hello World</h1>
    };

    function Greeting(){
      return <h2>Welcome to Learning JSX</h2>
    }

    function Description(){
      return <p>JSX allows developer to write HTML in Javascript</p>
    }

    // ambil element yang akan digunakan
    const container = document.getElementById("mydiv");

    // memberitahu bahwa ini adalah Root untuk digunakan react
    const root = ReactDOM.createRoot(container);

    // render react document di browser
    root.render(
      <div>
        <Hello />
        <Greeting />  
        <Description />
      </div>
    );
  </script>

</body>
</html>
