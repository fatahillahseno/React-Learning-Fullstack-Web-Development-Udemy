<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <!-- library react untuk install modul core react -->
  
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- library react-dom untuk run react di browser -->
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- library babel untuk membaca dan memahami JSX code ke Javascript-->

</head> 
<body>
  <div id="mydiv"></div>
  <h2>Another Heading</h2>

  
  <!-- Penting -->
  <!-- type di-set text/babel agar babel bisa memahami JSX elements dan mengkonversinya menjadi javascript yang valid -->
  <script type="text/babel">
    // component 
    function Hello(props){
      console.log(props);
      return (
        <h1>
          Hello {props.firstName} {props.lastName}! You are {" "}
          {new Date().getFullYear() - parseInt(props.birthYear)} 
        </h1>
      )
    };

    function Greeting({nama ="Guest"}){
      return <h2>Welcome {nama}</h2>
    }

    function Description({text="JSX allows developer to write HTML in Javascript"}){
      return <p>{text}</p>
    }

    // ambil element yang akan digunakan
    const container = document.getElementById("mydiv");

    // memberitahu bahwa ini adalah Root untuk digunakan react
    const root = ReactDOM.createRoot(container);

    // misalkan kita ada user All Might
    let user = "All ight";

    // render react document di browser
    root.render(
      <div>
        <Hello firstName="Seno" lastName="Fatahillah"/>
        <Hello firstName="Satria" lastName="Bima" birthYear="1998"/>  
        
        // memberitahukan jika user All Might login, maka render Greeting dengan properti nama All Might
        // jika tidak render component dengan nilai default yang ada
        {user == "All Might" ? <Greeting nama="All Might"/> : <Greeting />} 
        
        // jika user All Might Login, maka tampilkan komponent Greeting dengan properti nama All Might
        // jika All Might tidak login, makan jangan tampilkan apapun
        {user == "All Might"  && <Greeting nama="All Might"/>}
        <Description />
      </div>
    );
  </script>

</body>
</html>
